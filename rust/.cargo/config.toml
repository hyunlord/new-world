# Build settings
[build]
# Uncomment below if mold linker is available on your system
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# macOS: use lld if available for faster linking
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/bin/ld64.lld"]

[profile.dev]
# Faster debug builds
opt-level = 1

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
