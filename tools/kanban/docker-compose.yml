version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8800:8800"
    volumes:
      - ./backend:/app
      - kanban-data:/app/data
    environment:
      - KANBAN_DB_PATH=/app/data/kanban.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3100:3100"
    depends_on:
      - backend

volumes:
  kanban-data:
